version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pii_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # App
      API_V1_STR: /api/v1
      PROJECT_NAME: "DPDP PII Redaction Platform"
      # Secrets (set in real deployments)
      SECRET_KEY: ${SECRET_KEY:-change-me}
      # Database
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:postgres@db:5432/pii_platform
      # Celery/Redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY: "true"
      # CORS (adjust to your domain)
      BACKEND_CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me}
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:postgres@db:5432/pii_platform
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY: "true"
    depends_on:
      - redis
      - db

  frontend:
    build: 
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
